<div class="backdrop-blur-xl bg-white/[0.03] border border-white/10 rounded-2xl overflow-hidden">
  <div class="px-4 py-3.5 border-b border-white/10 flex items-center justify-between">
    <h3 class="text-white font-semibold text-sm">Folders</h3>
    <button
      (click)="showNewFolder.set(!showNewFolder())"
      class="p-1.5 text-slate-400 hover:text-white hover:bg-white/10 rounded-lg transition-all duration-200 cursor-pointer"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
      </svg>
    </button>
  </div>

  <div class="p-2">
    <button
      (click)="selectFolder(null)"
      class="w-full px-3 py-2.5 text-left text-sm rounded-xl transition-all duration-200 flex items-center gap-2.5 cursor-pointer group"
      [class.bg-indigo-500/15]="!selectedFolderId()"
      [class.text-indigo-300]="!selectedFolderId()"
      [class.text-slate-300]="selectedFolderId()"
      [class.hover:bg-white/5]="selectedFolderId()"
    >
      <svg class="w-4 h-4 transition-transform duration-200 group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
      </svg>
      All Entries
    </button>

    @for (folder of folders(); track folder.id) {
      @if (renamingFolderId() === folder.id) {
        <div class="flex items-center gap-2 px-3 py-2 animate-fade-in">
          <input
            type="text"
            [value]="renamingValue()"
            (input)="renamingValue.set($any($event.target).value)"
            (keydown.enter)="confirmRename(folder.id)"
            (keydown.escape)="cancelRename()"
            (blur)="confirmRename(folder.id)"
            class="flex-1 px-3 py-1.5 bg-white/5 border border-indigo-500/50 rounded-lg text-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all"
            autofocus
          />
        </div>
      } @else {
        <div
          class="w-full px-3 py-2.5 text-left text-sm rounded-xl transition-all duration-200 flex items-center justify-between group cursor-pointer"
          [class.bg-indigo-500/15]="selectedFolderId() === folder.id"
          [class.text-indigo-300]="selectedFolderId() === folder.id"
          [class.text-slate-300]="selectedFolderId() !== folder.id"
          [class.hover:bg-white/5]="selectedFolderId() !== folder.id"
          (click)="selectFolder(folder.id)"
        >
          <div class="flex items-center gap-2.5 min-w-0">
            <svg class="w-4 h-4 flex-shrink-0 transition-transform duration-200 group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
            </svg>
            <span class="truncate" (dblclick)="startRename(folder.id, folder.name, $event)">{{ folder.name }}</span>
          </div>
          <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-all duration-200">
            <button
              (click)="startRename(folder.id, folder.name, $event)"
              class="p-1 text-slate-500 hover:text-indigo-400 cursor-pointer"
              title="Rename"
            >
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
              </svg>
            </button>
            <button
              (click)="deleteFolder(folder.id, $event)"
              class="p-1 text-slate-500 hover:text-red-400 cursor-pointer"
              title="Delete"
            >
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
              </svg>
            </button>
          </div>
        </div>
      }
    }

    @if (showNewFolder()) {
      <div class="flex items-center gap-2 px-3 py-2 animate-fade-in">
        <input
          type="text"
          [value]="newFolderName()"
          (input)="newFolderName.set($any($event.target).value)"
          (keydown.enter)="createFolder()"
          placeholder="Folder name"
          class="flex-1 px-3 py-1.5 bg-white/5 border border-white/10 rounded-lg text-white text-sm placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500/50 transition-all"
          autofocus
        />
        <button
          (click)="createFolder()"
          class="text-indigo-400 hover:text-indigo-300 text-sm font-medium cursor-pointer transition-colors"
        >
          Add
        </button>
      </div>
    }
  </div>
</div>
