<div class="backdrop-blur-xl bg-white/[0.03] border border-white/10 rounded-2xl overflow-hidden">
  <div class="px-4 py-3.5 border-b border-white/10">
    <h3 class="text-white font-semibold text-sm">Password Generator</h3>
  </div>
  <div class="p-4 space-y-4">
    @if (password()) {
      <div class="flex items-center gap-2">
        <code class="flex-1 px-4 py-2.5 bg-gradient-to-r from-indigo-500/10 to-purple-500/10 border border-indigo-500/20 rounded-xl text-indigo-300 text-sm font-mono truncate">{{ password() }}</code>
        <button
          (click)="copy()"
          class="p-2.5 text-slate-400 hover:text-white hover:bg-white/10 rounded-xl transition-all duration-200 cursor-pointer"
          title="Copy"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            @if (copied()) {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" class="text-emerald-400" />
            } @else {
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
            }
          </svg>
        </button>
      </div>
      @if (strength() > 0) {
        <div class="flex items-center gap-3">
          <div class="flex-1 h-1.5 bg-white/10 rounded-full overflow-hidden">
            <div class="h-full transition-all duration-500 rounded-full" [class]="getStrengthColor() + ' ' + getStrengthWidthClass()"></div>
          </div>
          <span class="text-xs font-medium" [class]="getStrengthTextColor()">{{ getStrengthLabel() }}</span>
        </div>
      }
    }

    <div>
      <div class="flex items-center justify-between mb-2">
        <label class="text-xs text-slate-400 font-medium">Length</label>
        <span class="text-xs text-white font-mono bg-white/10 px-2 py-0.5 rounded">{{ options().length }}</span>
      </div>
      <input
        type="range"
        [value]="options().length"
        (input)="updateOption('length', +$any($event.target).value)"
        min="8"
        max="64"
        class="w-full h-1.5 bg-white/10 rounded-full appearance-none cursor-pointer [&::-webkit-slider-thumb]:appearance-none [&::-webkit-slider-thumb]:w-4 [&::-webkit-slider-thumb]:h-4 [&::-webkit-slider-thumb]:bg-indigo-500 [&::-webkit-slider-thumb]:rounded-full [&::-webkit-slider-thumb]:cursor-pointer [&::-webkit-slider-thumb]:transition-transform [&::-webkit-slider-thumb]:hover:scale-110 [&::-webkit-slider-thumb]:shadow-lg [&::-webkit-slider-thumb]:shadow-indigo-500/50"
      />
    </div>

    <div class="grid grid-cols-2 gap-2">
      <label class="flex items-center gap-2.5 text-sm text-slate-300 cursor-pointer p-2 rounded-lg hover:bg-white/5 transition-colors">
        <input
          type="checkbox"
          [checked]="options().uppercase"
          (change)="updateOption('uppercase', $any($event.target).checked)"
          class="w-4 h-4 rounded border-white/20 bg-white/5 text-indigo-500 focus:ring-indigo-500 focus:ring-offset-0 cursor-pointer"
        />
        <span class="font-mono">A-Z</span>
      </label>
      <label class="flex items-center gap-2.5 text-sm text-slate-300 cursor-pointer p-2 rounded-lg hover:bg-white/5 transition-colors">
        <input
          type="checkbox"
          [checked]="options().lowercase"
          (change)="updateOption('lowercase', $any($event.target).checked)"
          class="w-4 h-4 rounded border-white/20 bg-white/5 text-indigo-500 focus:ring-indigo-500 focus:ring-offset-0 cursor-pointer"
        />
        <span class="font-mono">a-z</span>
      </label>
      <label class="flex items-center gap-2.5 text-sm text-slate-300 cursor-pointer p-2 rounded-lg hover:bg-white/5 transition-colors">
        <input
          type="checkbox"
          [checked]="options().numbers"
          (change)="updateOption('numbers', $any($event.target).checked)"
          class="w-4 h-4 rounded border-white/20 bg-white/5 text-indigo-500 focus:ring-indigo-500 focus:ring-offset-0 cursor-pointer"
        />
        <span class="font-mono">0-9</span>
      </label>
      <label class="flex items-center gap-2.5 text-sm text-slate-300 cursor-pointer p-2 rounded-lg hover:bg-white/5 transition-colors">
        <input
          type="checkbox"
          [checked]="options().symbols"
          (change)="updateOption('symbols', $any($event.target).checked)"
          class="w-4 h-4 rounded border-white/20 bg-white/5 text-indigo-500 focus:ring-indigo-500 focus:ring-offset-0 cursor-pointer"
        />
        <span class="font-mono">!@#$</span>
      </label>
    </div>

    <button
      (click)="generate()"
      class="w-full px-4 py-2.5 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-400 hover:to-purple-500 text-white text-sm font-medium rounded-xl transition-all duration-200 cursor-pointer shadow-lg shadow-indigo-500/25 hover:shadow-indigo-500/40 hover:scale-[1.02] active:scale-[0.98]"
    >
      Generate Password
    </button>
  </div>
</div>
