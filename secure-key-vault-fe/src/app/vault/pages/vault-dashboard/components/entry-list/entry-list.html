<div class="backdrop-blur-xl bg-white/[0.03] border border-white/10 rounded-2xl overflow-hidden">
  <div class="px-5 py-4 border-b border-white/10 flex items-center justify-between gap-4">
    <h3 class="text-white font-semibold whitespace-nowrap">Entries ({{ entries().length }})</h3>
    <div class="relative flex-1 max-w-xs">
      <input
        type="text"
        [value]="searchQuery()"
        (input)="onSearch($event)"
        placeholder="Search vault..."
        class="w-full px-4 py-2 pl-10 bg-white/5 border border-white/10 rounded-xl text-white text-sm placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500/50 transition-all"
      />
      <svg class="w-4 h-4 text-slate-500 absolute left-3.5 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
    </div>
  </div>

  @if (loading()) {
    <div class="p-12 text-center">
      <div class="relative inline-block">
        <div class="w-12 h-12 border-2 border-indigo-500/20 border-t-indigo-500 rounded-full animate-spin"></div>
      </div>
      <p class="text-slate-400 text-sm mt-4">Loading entries...</p>
    </div>
  } @else if (entries().length === 0) {
    <div class="p-12 text-center">
      <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-slate-500/10 to-slate-600/10 flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
        </svg>
      </div>
      <p class="text-white font-medium">No entries yet</p>
      <p class="text-slate-500 text-sm mt-1">Add your first password or secure note</p>
    </div>
  } @else {
    <div class="divide-y divide-white/5">
      @for (entry of entries(); track entry.id) {
        <div
          class="group flex items-center justify-between px-5 py-4 hover:bg-white/[0.03] transition-all duration-200 cursor-pointer"
          (click)="selectEntry(entry)"
        >
          <div class="flex items-center gap-4 min-w-0 flex-1">
            <div class="w-11 h-11 rounded-xl flex items-center justify-center flex-shrink-0 transition-transform duration-200 group-hover:scale-105" [class]="getTypeColor(entry.entryType)">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="getTypeIcon(entry.entryType)" />
              </svg>
            </div>
            <div class="min-w-0">
              <p class="text-white text-sm font-medium truncate group-hover:text-indigo-300 transition-colors">{{ getTitle(entry) }}</p>
              <p class="text-slate-500 text-xs truncate mt-0.5">{{ getSubtitle(entry) }}</p>
            </div>
          </div>
          <div class="flex items-center gap-1 flex-shrink-0 opacity-0 group-hover:opacity-100 transition-opacity duration-200">
            <button
              (click)="editEntry(entry, $event)"
              class="p-2.5 text-slate-400 hover:text-white hover:bg-white/10 rounded-lg transition-all duration-200"
              title="Edit"
            >
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
              </svg>
            </button>
            <button
              (click)="deleteEntry(entry, $event)"
              class="p-2.5 text-slate-400 hover:text-red-400 hover:bg-red-500/10 rounded-lg transition-all duration-200"
              title="Delete"
            >
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
              </svg>
            </button>
          </div>
        </div>
      }
    </div>
  }
</div>
